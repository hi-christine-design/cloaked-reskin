<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cloaked reskin — 20 screen comparison</title>
  <link rel="stylesheet" href="deploy/tokens/colors.css" />
  <link rel="stylesheet" href="deploy/tokens/numbers.css" />
  <link rel="stylesheet" href="deploy/tokens/typography.css" />
  <link rel="stylesheet" href="deploy/tokens/themes.css" />
  <style>
    @font-face {
      font-family: 'Simula';
      src: url('fonts/Simula-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Simula';
      src: url('fonts/Simula-Italic.otf') format('opentype');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: var(--ct-font-sans);
      background: #e9e6dc;
      color: var(--ct-text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 20px;
    }

    .top-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .page-header {
      flex: 0 0 auto;
      padding: 0;
    }
    .page-header h1 {
      font-family: var(--ct-font-sans);
      font-weight: 400;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: 0;
      margin: 0;
      color: var(--ct-text-primary);
    }
    .page-header .subtitle { display: none; }

    .tab-bar {
      position: static;
      background: transparent;
      border-bottom: none;
      padding: 0;
      overflow: visible;
      flex: 1 1 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-self: flex-start;
    }
    .tab-bar button {
      font: inherit;
      font-size: 12px;
      color: var(--ct-text-primary);
      opacity: 0.4;
      background: transparent;
      border: 0.75px solid rgba(0,0,0,0.25);
      padding: 7.5px 12px;
      border-radius: 75px;
      margin: 0;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, opacity 120ms ease;
    }
    .tab-bar button:hover {
      opacity: 0.7;
      background: rgba(0,0,0,0.04);
    }
    .tab-bar button[aria-selected="true"] {
      background: #000;
      color: #f2f0ea;
      opacity: 1;
      border-color: transparent;
    }

    main { padding: 0; }
    .pane { display: none; }
    .pane[data-active="true"] { display: block; }

    .pane-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .panel-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1 1 0;
      min-width: 0;
    }
    .panel-stack .label {
      font-family: var(--ct-font-sans);
      font-size: 12px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--ct-text-primary);
    }

    .panel {
      background: #e4e0d6;
      padding: 60px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .phone-scale {
      flex: 0 0 auto;
      --phone-w: 393px;
      --phone-h: 852px;
      width: calc(var(--phone-w) * var(--phone-scale, 1));
      height: calc(var(--phone-h) * var(--phone-scale, 1));
      position: relative;
    }
    .phone-scale--after {
      --phone-w: 393px;
      --phone-h: 852px;
    }

    .phone {
      width: 393px;
      height: 852px;
      flex: 0 0 393px;
      background: var(--ct-bkgd-02);
      border-radius: 32px;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(var(--phone-scale, 1));
      transform-origin: top left;
      box-shadow: 0 1px 0 var(--ct-color-black-05), 0 12px 32px rgba(0,0,0,0.06);
    }
    .phone-scroll {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--ct-color-grey-02) transparent;
    }
    .phone::-webkit-scrollbar { width: 6px; }
    .phone::-webkit-scrollbar-thumb { background: var(--ct-color-grey-02); border-radius: 999px; }
    .phone::-webkit-scrollbar-track { background: transparent; }
    .phone--before { background: var(--ct-color-white); }
    .phone--before img { display: block; width: 100%; height: auto; }
    .phone--after { width: 393px; height: 852px; flex: 0 0 393px; }

    .reskin {
      background: var(--ct-bkgd-02);
      min-height: 100%;
      font-family: var(--ct-font-sans);
      color: var(--ct-text-primary);
      display: flex;
      flex-direction: column;
    }
    .reskin .safe-top { height: var(--ct-spacing-40); flex: 0 0 auto; }

    .reskin .page-bar {
      background: var(--ct-bkgd-02);
      padding: 0 var(--ct-spacing-20) var(--ct-spacing-16);
      display: flex;
      align-items: center;
      gap: var(--ct-spacing-12);
      min-height: 56px;
    }
    .reskin .page-bar .title {
      font-family: var(--ct-text-h2-serif-family);
      font-weight: var(--ct-text-h2-serif-weight);
      font-size: var(--ct-text-h2-serif-size);
      line-height: var(--ct-text-h2-serif-line-height);
      letter-spacing: var(--ct-text-h2-serif-letter-spacing);
      color: var(--ct-text-primary);
      flex: 1 1 auto;
      text-transform: lowercase;
    }
    .reskin .page-bar .icon-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ct-text-primary);
      cursor: default;
    }

    .sheet {
      background: var(--ct-bkgd-02);
      padding: var(--ct-spacing-20);
    }
    .sheet + .sheet { margin-top: 1px; }
    .sheet--flush { padding: 0; }

    .section-title {
      font-family: var(--ct-text-h3-family);
      font-weight: var(--ct-text-h3-weight);
      font-size: var(--ct-text-h3-size);
      line-height: var(--ct-text-h3-line-height);
      letter-spacing: var(--ct-text-h3-letter-spacing);
      text-transform: capitalize;
      color: var(--ct-text-primary);
      margin: 0 0 var(--ct-spacing-4);
    }
    .section-sub {
      font-size: 14px;
      color: var(--ct-text-secondary);
      margin: 0 0 var(--ct-spacing-16);
    }

    .row {
      display: flex;
      align-items: center;
      gap: var(--ct-spacing-12);
      padding: var(--ct-spacing-16) var(--ct-spacing-20);
      margin: 0 calc(-1 * var(--ct-spacing-20));
      border-top: 1px solid var(--ct-divider);
    }
    .row:first-of-type { border-top: 0; }
    .row .avatar {
      width: 32px; height: 32px;
      border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: var(--ct-color-white);
      flex: 0 0 auto;
      overflow: hidden;
    }
    .row .body { flex: 1 1 auto; min-width: 0; }
    .row .body .label { font-size: 16px; color: var(--ct-text-primary); }
    .row .body .meta { font-size: 14px; color: var(--ct-text-secondary); }
    .row .right { font-size: 14px; color: var(--ct-text-secondary); flex: 0 0 auto; }

    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%;
      padding: var(--ct-spacing-16) var(--ct-spacing-24);
      background: var(--ct-cta-primary-container);
      color: var(--ct-cta-primary-text);
      border-radius: 999px;
      font-size: 16px;
      border: none;
      cursor: default;
    }
    .cta--secondary { background: var(--ct-cta-secondary-container); color: var(--ct-cta-secondary-text); }
    .cta--brand { background: var(--ct-brand); color: var(--ct-color-white); }

    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--ct-color-black-05);
      color: var(--ct-text-primary);
    }
    .pill--success { background: var(--ct-status-success-subtle); color: var(--ct-status-success-solid); }
    .pill--fail { background: var(--ct-status-fail-subtle); color: var(--ct-status-fail-solid); }

    .nav-bottom {
      background: #ffffff;
      border-top: none;
      padding: 16px 24px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: auto;
      position: sticky;
      bottom: 0;
      z-index: 2;
    }
    .nav-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 345px;
    }
    .nav-bottom .item {
      display: inline-flex;
      align-items: center;
      padding: 12px;
      color: #141410;
      opacity: 0.3;
      cursor: pointer;
    }
    .nav-bottom .item.active {
      opacity: 1;
      background: transparent;
    }
    .nav-bottom .item svg { display: block; }
    .nav-bottom .item span { display: none; }

    .chips { display: flex; gap: var(--ct-spacing-8); flex-wrap: wrap; }
    .chip {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      background: var(--ct-color-black-05);
      color: var(--ct-text-primary);
    }
    .chip.active {
      background: var(--ct-cta-primary-container);
      color: var(--ct-cta-primary-text);
    }

    .search {
      display: flex; align-items: center; gap: var(--ct-spacing-8);
      background: var(--ct-color-black-05);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--ct-text-secondary);
      font-size: 14px;
    }
    .search input {
      flex: 1; background: transparent; border: none; outline: none;
      font: inherit; color: var(--ct-text-primary);
    }

    .avt-warby { background: #2da9ff; }
    .avt-twitch { background: #9146FF; }
    .avt-airbnb { background: #FF5A5F; }
    .avt-spotify { background: #1DB954; }
    .avt-amazon { background: #FF9900; }
    .avt-instagram { background: linear-gradient(135deg, #fdf497, #fd5949 45%, #d6249f 70%, #285AEB); }
    .avt-target { background: #CC0000; }
    .avt-dashlane { background: #0E2C38; }
    .avt-zillow { background: #006AFF; }
    .avt-starbucks { background: #006241; }
    .avt-southwest { background: #304CB2; }
    .avt-bee { background: #46b85a; }
    .avt-cloak-blue { background: linear-gradient(135deg, #2da9ff, #29bee8); }
    .avt-cloak-rose { background: linear-gradient(135deg, #f0536b, #ff85a1); }
    .avt-cloak-violet { background: linear-gradient(135deg, #635ef9, #a474ff); }
    .avt-cloak-green { background: linear-gradient(135deg, #00c49a, #62c081); }
    .avt-cloak-foam { background: linear-gradient(135deg, #29bee8, #6cd3ef); }

    .stack-12 > * + * { margin-top: var(--ct-spacing-12); }
    .stack-16 > * + * { margin-top: var(--ct-spacing-16); }
    .stack-8 > * + * { margin-top: var(--ct-spacing-8); }
    .row-flex { display: flex; align-items: center; gap: var(--ct-spacing-12); }
    .row-flex.between { justify-content: space-between; }
    .num-display {
      font-family: var(--ct-text-display-1-family);
      font-weight: var(--ct-text-display-1-weight);
      font-size: var(--ct-text-display-1-size);
      line-height: var(--ct-text-display-1-line-height);
      letter-spacing: var(--ct-text-display-1-letter-spacing);
      color: var(--ct-text-primary);
    }
    .num-display-2 {
      font-family: var(--ct-text-display-2-family);
      font-weight: var(--ct-text-display-2-weight);
      font-size: var(--ct-text-display-2-size);
      line-height: var(--ct-text-display-2-line-height);
      letter-spacing: var(--ct-text-display-2-letter-spacing);
      color: var(--ct-text-primary);
    }
    .h3 {
      font-family: var(--ct-text-h3-family);
      font-weight: var(--ct-text-h3-weight);
      font-size: var(--ct-text-h3-size);
      line-height: var(--ct-text-h3-line-height);
      letter-spacing: var(--ct-text-h3-letter-spacing);
    }
    .body-small {
      font-size: var(--ct-text-body-small-size);
      line-height: 1.4;
      color: var(--ct-text-secondary);
    }
    .divider { height: 1px; background: var(--ct-divider); border: 0; margin: 0; }

    .fab {
      position: sticky;
      bottom: 96px;
      align-self: flex-end;
      margin: 0 16px -56px auto;
      width: 56px; height: 56px;
      border-radius: 999px;
      background: var(--ct-brand);
      color: var(--ct-color-white);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px;
      z-index: 3;
    }

    .hero-illus {
      height: 180px;
      border-radius: 24px;
      background: radial-gradient(80% 100% at 50% 30%, #ffe2c2 0%, #ffcd9b 60%, #f4a87a 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--ct-color-grey-05);
    }
    .hero-illus--id { background: radial-gradient(80% 100% at 50% 30%, #cfebff 0%, #9bd1f6 60%, #65a8d8 100%); }

    /* Day 1 / Home reskin (Figma 17492:12966) */
    .hp-safe-top { background: #0b0b0a; height: 40px; }

    .hp-hero {
      position: relative;
      overflow: hidden;
      background: #1b1b18;
      color: #f3f1ed;
      padding: 0 16px 32px;
    }
    .hp-hero::before {
      content: "";
      position: absolute;
      top: -260px; left: 50%;
      width: 421px; height: 421px;
      margin-left: -210px;
      background: radial-gradient(circle at center, rgba(255,85,12,0.9) 0%, rgba(255,85,12,0.5) 30%, rgba(255,85,12,0) 70%);
      filter: blur(40px);
      pointer-events: none;
    }
    .hp-hero > * { position: relative; }

    .hp-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 4px 24px;
    }
    .hp-logo {
      font-family: var(--ct-text-h2-serif-family);
      font-weight: var(--ct-text-h2-serif-weight);
      font-size: 22px;
      color: #f3f1ed;
      letter-spacing: 0;
    }
    .hp-menu-btn {
      width: 40px; height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      display: inline-flex; align-items: center; justify-content: center;
      color: #f3f1ed;
    }

    .hp-headline {
      font-family: var(--ct-text-h1-serif-family);
      font-weight: var(--ct-text-h1-serif-weight);
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0.16px;
      margin: 80px 0 32px;
      color: #f3f1ed;
    }

    .hp-ai-notif {
      background: #0b0b0a;
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .hp-ai-avatar {
      width: 40px; height: 40px;
      flex: 0 0 40px;
      background: rgba(255,85,12,0.15);
      border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #ff550c;
    }
    .hp-ai-text { display: flex; flex-direction: column; }
    .hp-ai-primary { color: rgba(243,241,237,0.7); font-size: 16px; line-height: 1.3; margin: 0; }
    .hp-ai-secondary { color: #84827e; font-size: 16px; line-height: 1.3; margin: 0; }

    .hp-dashboard {
      background: #f3f1ed;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      color: #141410;
      margin-top: -20px;
      position: relative;
      z-index: 1;
    }

    .hp-dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      line-height: 1.3;
      color: #141410;
    }

    .hp-card {
      background: #ffffff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
    }
    .hp-card-row {
      display: flex;
      justify-content: space-between;
      padding: 20px 16px 0;
      font-size: 16px;
      line-height: 1.3;
    }
    .hp-risk-high {
      color: #c90004;
      letter-spacing: -0.8px;
    }
    .hp-risk-bar {
      height: 16px;
      margin: 16px;
      background: linear-gradient(90deg, #008924 0%, #ffcc00 45%, #ff550c 70%, #c90004 100%);
      border-radius: 999px;
      position: relative;
    }
    .hp-risk-bar::after {
      content: "";
      position: absolute;
      top: -4px; bottom: -4px;
      right: 8%;
      width: 4px;
      background: #141410;
      border-radius: 999px;
    }
    .hp-card-footer {
      border-top: 0.5px solid rgba(11,11,10,0.15);
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hp-link {
      font-size: 12px;
      color: #141410;
      letter-spacing: 0.5px;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .hp-card-pad-top {
      padding: 24px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .hp-card-title { font-size: 16px; line-height: 1.3; margin: 0; color: #141410; }
    .hp-big-num-row { display: flex; gap: 16px; align-items: flex-end; }
    .hp-big-num {
      font-size: 48px;
      letter-spacing: -0.96px;
      line-height: 1;
      color: #141410;
    }
    .hp-stat-up {
      background: rgba(0,137,36,0.1);
      color: #008924;
      border-radius: 20px;
      padding: 4px 12px 4px 8px;
      font-size: 12px;
      line-height: 1.3;
      letter-spacing: 0.06px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 32px;
    }

    .hp-list { list-style: none; padding: 0; margin: 16px; }
    .hp-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-top: 0.5px solid rgba(11,11,10,0.15);
      font-size: 16px;
      line-height: 1.3;
      color: #141410;
    }

    .hp-pad { padding: 24px 16px 24px; }

    .hp-section-divider {
      font-size: 12px;
      color: #141410;
      letter-spacing: 0.5px;
      line-height: 1.3;
      padding: 8px 20px;
      border-bottom: 0.5px solid rgba(11,11,10,0.15);
    }
    .hp-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      border-bottom: 0.5px solid rgba(11,11,10,0.15);
    }
    .hp-progress-avatar {
      width: 40px; height: 40px;
      border-radius: 999px;
      flex: 0 0 40px;
      background: #1b1b18;
      color: #f3f1ed;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
    .hp-avt-h { background: #1b1b18; }
    .hp-avt-b { background: #5936c1; }
    .hp-avt-icon { background: #e5e3df; color: #5936c1; }
    .hp-progress-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .hp-progress-title-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 16px;
      line-height: 1.3;
      color: #141410;
    }
    .hp-progress-title-row > span:first-child {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hp-progress-status {
      font-size: 14px;
      line-height: 1.2;
      color: #84827e;
      letter-spacing: 0.07px;
      margin-top: -8px;
    }
    .hp-progress-bar {
      height: 8px;
      background: #f3f1ed;
      border-radius: 999px;
      overflow: hidden;
    }
    .hp-progress-fill {
      height: 100%;
      background: #ff550c;
      width: 47%;
    }

    .hp-secondary-btn {
      background: transparent;
      border: 1px solid rgba(11,11,10,0.08);
      border-radius: 16px;
      height: 56px;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.3;
      color: #141410;
      cursor: pointer;
    }

    .hp-faq {
      background: #0b0b0a;
      padding: 40px 0 96px;
      color: #f3f1ed;
    }
    .hp-faq-title {
      font-family: var(--ct-font-sans);
      font-weight: 400;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0.1px;
      padding: 0 16px;
      margin: 0 0 20px;
      color: #f3f1ed;
    }
    .hp-faq-cards {
      display: flex;
      gap: 10px;
      padding: 0 20px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .hp-faq-cards::-webkit-scrollbar { display: none; }
    .hp-faq-card {
      flex: 0 0 233px;
      background: #1b1b18;
      border-radius: 20px;
      padding: 24px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 276px;
      box-sizing: border-box;
    }
    .hp-faq-label {
      font-size: 14px;
      color: #ff550c;
      letter-spacing: 0.07px;
      line-height: 1.2;
    }

        const mh = document.querySelector('.mobile-header');

        const headerH = mh ? mh.getBoundingClientRect().height : 150;
        const bottomH = mb ? mb.getBoundingClientRect().height : 80;
        const panelPadV = 32;
        const availH = window.innerHeight - headerH - bottomH - panelPadV;
        const availW = window.innerWidth - 32;
        scale = Math.max(0.3, Math.min(availH / 852, availW / 393, 1));

        const availH = window.innerHeight - verticalChrome;
        scale = Math.max(0.35, Math.min(1, availH / 852));

      }
    });

    /* Mobile: swipe left/right to navigate screens */
    let touchStartX = 0, touchStartY = 0, touchSwiped = false;
    document.addEventListener('touchstart', (e) => {
      if (window.innerWidth > 768) return;
      if (e.target.closest('.mobile-tab, .mobile-arrow, .mobile-header, .mobile-bottom-bar')) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchSwiped = false;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (window.innerWidth > 768) return;
      if (!touchStartX) return;
      const endX = e.changedTouches[0].clientX;
      const endY = e.changedTouches[0].clientY;
      const dx = endX - touchStartX;
      const dy = endY - touchStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        touchSwiped = true;
        moveTab(dx < 0 ? 1 : -1);
      }
      touchStartX = 0;
    }, { passive: true });
  </script>
</body>
</html>
